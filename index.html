<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple Landing</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1>Simple Demo Landing Page</h1>
    <p class="subtitle">
    This page demonstrates a redirect button and a working contact form.
    </p>

    <!-- Redirect Button -->
    <a class="btn" href="https://example.com">
    Go to Website
    </a>

    <!-- Contact Form -->

    <form action="https://api.web3forms.com/submit" method="POST" class="form">

        <input type="hidden" name="access_key" value="7cba3acc-6d19-4ae5-8bff-28f9d89d4b0d">
        <input type="hidden" name="redirect" value="http://127.0.0.1:5500/thanks.html">
        <input type="checkbox" name="botcheck" class="hidden">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>

    </form>

</div>

</body>
</html>
